---
version: "2"

linters:
  enable:
    # Default linters
    - errcheck
    - govet
    - staticcheck
    - unused
    # Additional linters
    - bodyclose
    - dupl
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - gosec
    - misspell
    - nakedret
    - prealloc
    - revive
    - unconvert
    - unparam
    - whitespace
  settings:
    gocyclo:
      min-complexity: 15
    gocognit:
      min-complexity: 20
    dupl:
      threshold: 100
    goconst:
      min-len: 3
      min-occurrences: 4
    misspell:
      locale: US
    errcheck:
      exclude-functions:
        - (net/http.ResponseWriter).Write
        - fmt.Fprintf
        - (io.Closer).Close
    gosec:
      excludes:
        - G104
        - G706
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: increment-decrement
        - name: var-naming
        - name: package-comments
          disabled: true
  exclusions:
    rules:
      # fetchAndDecode closes resp.Body but linter can't trace it through generics
      - path: internal/mcptools/tools\.go
        linters:
          - bodyclose
      # test functions for different tools are structurally similar by design
      - path: _test\.go
        linters:
          - dupl

formatters:
  enable:
    - gofmt
    - goimports
