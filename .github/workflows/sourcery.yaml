---
name: sourcery-ai

"on":
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  sourcery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Sourcery AI Code Review
        uses: sourcery-ai/action@v1
        with:
          token: ${{ secrets.SOURCERY_TOKEN }}
